name: Build and Release APK

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest
    
    permissions:
      contents: write
      packages: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Generate debug keystore
        run: |
          keytool -genkey -v -keystore debug.keystore -keyalg RSA -keysize 2048 -validity 10000 \
            -alias androiddebugkey -keypass android -storepass android \
            -dname "CN=Android Debug,O=Android,C=US"

      - name: Build debug APK
        run: gradle assembleDebug

      - name: Find APK
        id: apk
        run: |
          APK=$(find app/build/outputs/apk/debug -name "*.apk" -type f | head -1)
          echo "apk_path=${APK}" >> $GITHUB_OUTPUT

      - name: Get Next Version
        id: version
        uses: reecetech/version-increment@2024.4.3
        with:
          scheme: semver
          increment: patch

      - name: Create Release with APK
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ steps.version.outputs.v-version }}
          files: ${{ steps.apk.outputs.apk_path }}
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
